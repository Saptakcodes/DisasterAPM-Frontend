<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - DisasterAPM</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f97316, #dc2626);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    .container {
      max-width: 500px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }
    h1 { font-size: 2.5em; margin-bottom: 20px; }
    p { font-size: 1.2em; margin-bottom: 30px; opacity: 0.9; }
    .icon { font-size: 5em; margin-bottom: 20px; }
    button {
      background: white;
      color: #f97316;
      border: none;
      padding: 12px 30px;
      font-size: 1.1em;
      border-radius: 25px;
      cursor: pointer;
      transition: transform 0.2s;
      font-weight: bold;
    }
    button:hover { transform: scale(1.05); }
    .features {
      margin-top: 30px;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>Don't worry! You can still access previously loaded predictions and safety information.</p>
    <div class="features">
      ✓ View cached predictions<br>
      ✓ Access safety guides<br>
      ✓ Check emergency contacts
    </div>
    <button onclick="window.location.reload()">Try Reconnecting</button>
  </div>
</body>
</html>
